<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>OSAKA 2026 - Travel Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#fff;--text:#222;--text2:#6a6a6a;--text3:#999;--accent:#ff385c;--border:#ebebeb;--surface:#f7f7f7;--shadow:0 0 0 1px rgba(0,0,0,.02),0 2px 6px rgba(0,0,0,.04),0 4px 8px rgba(0,0,0,.1);--r-sm:8px;--r-md:14px;--r-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:700;letter-spacing:-.5px}.logo span{color:var(--accent)}
.header-tags{display:flex;gap:10px;font-size:13px;color:var(--text2)}
.tag{background:var(--surface);padding:5px 12px;border-radius:20px;font-weight:500}

.tabs-wrap{position:sticky;top:57px;z-index:99;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.tabs{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:12px 20px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;text-align:center}
.tab:hover{color:var(--text)}.tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.tab small{display:block;font-size:11px;color:var(--text3);margin-top:2px;font-weight:400}

.main{max-width:1400px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1.2fr;gap:24px;min-height:calc(100vh - 120px)}
.panel{display:flex;flex-direction:column;gap:12px}

.day-head{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
.day-head h2{font-size:26px;font-weight:700;letter-spacing:-.5px}
.day-head .label{font-size:14px;color:var(--text2);font-weight:500}

.flight{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border-radius:var(--r-lg);padding:22px}
.flight-route{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.flight-city{text-align:center}.flight-city .city{font-size:22px;font-weight:700}.flight-city .time{font-size:13px;opacity:.7;margin-top:4px}
.flight-line{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;position:relative}
.flight-line::before{content:'';width:100%;height:1px;background:rgba(255,255,255,.3);position:absolute}
.flight-line .plane{background:#1a1a2e;padding:0 8px;position:relative;font-size:16px}
.flight-code{font-size:12px;opacity:.6;text-align:center}

.ev{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 18px;display:flex;gap:14px;align-items:flex-start;transition:.2s}
.ev:hover{box-shadow:var(--shadow)}
.ev-time{flex-shrink:0;width:80px;font-size:13px;font-weight:600;color:var(--accent);padding-top:1px}
.ev-body{flex:1}.ev-title{font-size:14px;font-weight:600;margin-bottom:3px}.ev-note{font-size:12px;color:var(--text2)}

.accom{background:var(--surface);border-radius:var(--r-lg);padding:18px 22px}
.accom h3{font-size:15px;font-weight:600;margin-bottom:10px}
.accom-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:12px}
.accom-grid dt{color:var(--text2);font-weight:500}.accom-grid dd{color:var(--text)}

.special{border-radius:var(--r-lg);padding:22px;color:#fff;font-size:13px;line-height:1.8}
.special h3{font-size:17px;margin-bottom:10px}
.special .dim{opacity:.6;margin-top:10px}

hr.div{border:none;border-top:1px solid var(--border);margin:8px 0}

.area-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.area-chip{padding:8px 12px;background:var(--surface);border-radius:var(--r-sm);font-size:12px;cursor:pointer;transition:.2s}
.area-chip:hover{background:#eee}.area-chip.on{background:var(--text);color:#fff}.area-chip.on .ac{color:rgba(255,255,255,.7)}.area-chip .an{font-weight:600}.area-chip .ac{color:var(--text2);font-size:11px}
.leaflet-tooltip{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;border:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}

.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:.2s;white-space:nowrap}
.chip:hover{background:var(--surface)}.chip.on{background:var(--text);color:#fff;border-color:var(--text)}
.chip .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}

.counter{font-size:12px;color:var(--text2);padding:4px 0}.counter strong{color:var(--accent)}

.plist{display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 340px);overflow-y:auto;padding-right:4px}
.plist::-webkit-scrollbar{width:3px}.plist::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}

.pc{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r-sm);transition:.2s;cursor:pointer}
.pc:hover{border-color:#ccc;box-shadow:var(--shadow);transform:translateY(-1px)}
.pc.done{opacity:.45;background:var(--surface)}.pc.done .pn{text-decoration:line-through}
.chk{width:32px;height:32px;min-width:32px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:14px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pc.done .chk{background:var(--accent);border-color:var(--accent)}
.pc.done .chk::after{content:'\2713'}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pi{flex:1;min-width:0}.pn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm{font-size:11px;color:var(--text2);display:flex;gap:6px;margin-top:1px}
.pnote{font-size:11px;color:var(--accent);font-weight:500;margin-top:1px}
.mbtn{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.2s}
.mbtn:hover{background:#eee;transform:scale(1.1)}

.map-wrap{position:sticky;top:120px;height:calc(100vh - 150px);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border)}
#map{width:100%;height:100%}

/* Mobile */
.back-btn{display:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:500;background:var(--text);color:#fff;border:none;border-radius:50px;padding:8px 18px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent}

@media(max-width:768px){
  .main{grid-template-columns:1fr;padding:16px}
  .map-wrap{position:relative;top:0;height:40vh;order:-1}
  .header-tags{display:none}
  .day-head h2{font-size:20px}
  .plist{max-height:none}
  .back-btn{display:block}
}
</style>
</head>
<body>

<header class="header"><div class="header-inner">
  <div class="logo">OSAKA <span>2026</span></div>
  <div class="header-tags"><span class="tag">4/16 ~ 4/20</span><span class="tag" id="pc"></span></div>
</div></header>

<nav class="tabs-wrap"><div class="tabs" id="tabs"></div></nav>

<main class="main">
  <div class="panel" id="panel"></div>
  <div class="map-wrap" id="mapWrap"><div id="map"></div><button class="back-btn" onclick="document.getElementById('panel').scrollIntoView({behavior:'smooth'})">&#8595; 목록으로</button></div>
</main>

  if(sch?.events?.length){h+=`<div style="font-size:13px;font-weight:600;color:var(--text2);margin:8px 0 4px;letter-spacing:.5px">&#128197; 오늘의 일정</div>`;sch.events.forEach(e=>{h+=`<div class="ev"><div class="ev-time">${e.time}</div><div class="ev-body"><div class="ev-title">${e.title}</div>${e.note?`<div class="ev-note">${e.note}</div>`:''}</div></div>`});}

  if(cur==='2026-04-17')h+=`<div class="special" style="background:linear-gradient(135deg,#1a1a2e,#0f3460)"><h3>&#127906; Universal Studios Japan</h3><div><strong>1 Day Studio Pass</strong> + 25주년 VIP 그룹 투어</div><div>&#9888;&#65039; VIP 접수: 09:45~10:15</div><div>&#127918; 닌텐도 월드 우선 입장</div><div>&#127917; 익스프레스 패스 x3 (해리포터, 할리우드 드림)</div><div>&#127860; 파크 레스토랑 10% 할인</div><div class="dim">Booking: USJ-P1X0000007NNBQ</div></div>`;

  if(cur==='2026-04-18')h+=`<div class="special" style="background:linear-gradient(135deg,#2d5016,#4a7c23)"><h3>&#127795; Ghibli Park</h3><div><strong>O-SANPO DAY PASS PREMIUM</strong></div><div>&#127939; 야외 에리어: 오전 입장</div><div>&#127970; 대창고: 14:00 입장</div><div>&#9888;&#65039; 여권 필수 (Group Leader: KIHWAN AHN)</div><div>&#128247; E-ticket 북마크 필수 (입구 WiFi 없음)</div><div class="dim">Booking: 7800209855</div></div>`;

  if(places.length){
    h+='<hr class="div">';
    h+=`<div style="font-size:13px;font-weight:600;color:var(--text2);margin:4px 0 8px;letter-spacing:.5px">&#127829; 주변 맛집 · 관광 · 쇼핑</div>`;
    const areas={};places.forEach(p=>{areas[p.area]=(areas[p.area]||0)+1});
    h+=`<div style="font-size:11px;color:var(--text3);margin-bottom:6px">&#128204; 지역별 보기</div>`;
    h+='<div class="area-chips">'+Object.entries(areas).sort((a,b)=>b[1]-a[1]).map(([a,c])=>`<div class="area-chip${filt===a?' on':''}" onclick="filt=filt==='${a}'?'all':'${a}';render()"><span class="an">${a}</span> <span class="ac">${c}곳</span></div>`).join('')+'</div>';

    // 그룹 기반 필터 — 음식 / 체험 분리
    const groupCounts={};
    places.forEach(p=>{const g=catToGroup(p.cat);groupCounts[g]=(groupCounts[g]||0)+1;});
    const foodGroups=Object.entries(GROUPS).filter(([g])=>groupCounts[g]&&!g.startsWith('🛍')&&!g.startsWith('📸'));
    const expGroups=Object.entries(GROUPS).filter(([g])=>groupCounts[g]&&(g.startsWith('🛍')||g.startsWith('📸')));

    h+=`<div style="font-size:11px;color:var(--text3);margin-bottom:4px">&#127860; 뭐 먹을까?</div>`;
    h+='<div class="filters"><div class="chip'+(filt==='all'?' on':'')+'" onclick="filt=\'all\';render()">전체</div>'+foodGroups.map(([g,v])=>`<div class="chip${filt===g?' on':''}" onclick="filt=filt==='${g}'?'all':'${g}';render()" style="${filt===g?'background:'+v.color+';border-color:'+v.color+';color:#fff':''}"><span class="dot" style="background:${v.color}"></span>${g} <span style="opacity:.6;font-size:11px">${groupCounts[g]||0}</span></div>`).join('')+'</div>';

    if(expGroups.length){
      h+=`<div style="font-size:11px;color:var(--text3);margin:8px 0 4px">&#128099; 뭐 할까?</div>`;
      h+='<div class="filters">'+expGroups.map(([g,v])=>`<div class="chip${filt===g?' on':''}" onclick="filt=filt==='${g}'?'all':'${g}';render()" style="${filt===g?'background:'+v.color+';border-color:'+v.color+';color:#fff':''}"><span class="dot" style="background:${v.color}"></span>${g} <span style="opacity:.6;font-size:11px">${groupCounts[g]||0}</span></div>`).join('')+'</div>';
    }

    const isGrp=g=>Object.keys(GROUPS).includes(g);
    const fp=filt==='all'?places:isGrp(filt)?places.filter(p=>catToGroup(p.cat)===filt):places.filter(p=>p.area===filt);
    const vc=fp.filter(p=>visited[p.name]).length;
    h+=`<div class="counter">방문 체크: <strong>${vc}</strong> / ${fp.length}곳 ${filt!=='all'?'<span style="color:var(--text3)">('+filt+' 필터)</span>':''}</div>`;
    h+='<div class="plist">'+fp.map(p=>{const done=visited[p.name]?'done':'';const grp=catToGroup(p.cat);return`<div class="pc ${done}" onclick="fly(${p.lat},${p.lng},'${encodeURIComponent(p.name)}')"><div class="cdot" style="background:${gc(p.cat)}"></div><div class="pi"><div class="pn">${p.name}</div><div class="pm"><span>${p.area}</span><span>${p.cat||'맛집'}</span>${DESC[p.name]?`<span style="color:#f59f00">★${DESC[p.name].rating}</span>`:''}</div><div style="font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${DESC[p.name]?.desc||''}</div>${p.note?`<div class="pnote">${p.note}</div>`:''}</div><div class="chk" onclick="event.stopPropagation();toggle('${encodeURIComponent(p.name)}')" title="방문 체크"></div></div>`}).join('')+'</div>';
  }

  P.innerHTML=h;
  updateMap();
}

function toggle(n){const name=decodeURIComponent(n);visited[name]=!visited[name];if(!visited[name])delete visited[name];localStorage.setItem('v',JSON.stringify(visited));render()}

function updateMap(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const places=dayPlaces(cur);

  // Accommodation
  const a=DATA.accom;
  const am=L.circleMarker([a.lat,a.lng],{radius:10,fillColor:'#222',color:'#fff',weight:3,fillOpacity:1}).bindPopup(`<div style="font-family:Inter,sans-serif"><strong>&#127968; ${a.name}</strong><br><small style="color:#666">${a.addr}</small><br><small>${a.station}</small><br><a href="https://www.google.com/maps/search/?api=1&query=${a.lat},${a.lng}" target="_blank" style="color:#228be6;font-size:12px">Google Maps &#8599;</a></div>`).bindTooltip('&#127968; 숙소',{direction:'top',offset:[0,-8]});
  am.addTo(map);markers.push(am);

  if(cur==='2026-04-17'){
    const u=L.circleMarker([34.6654,135.4323],{radius:14,fillColor:'#ff385c',color:'#fff',weight:3,fillOpacity:1}).bindPopup('<div style="font-family:Inter,sans-serif"><strong>&#127906; Universal Studios Japan</strong><br><a href="https://www.google.com/maps/search/?api=1&query=34.6654,135.4323" target="_blank" style="color:#228be6;font-size:12px">Google Maps &#8599;</a></div>').bindTooltip('&#127906; USJ',{direction:'top',offset:[0,-10],className:'tt'});
    u.addTo(map);markers.push(u);map.setView([34.6654,135.4323],14);return;
  }
  if(cur==='2026-04-18'&&places.length<=1){
    const g=L.circleMarker([35.1784,137.0585],{radius:14,fillColor:'#4a7c23',color:'#fff',weight:3,fillOpacity:1}).bindPopup('<div style="font-family:Inter,sans-serif"><strong>&#127795; Ghibli Park</strong><br><a href="https://www.google.com/maps/search/?api=1&query=35.1784,137.0585" target="_blank" style="color:#228be6;font-size:12px">Google Maps &#8599;</a></div>').bindTooltip('&#127795; 지브리파크',{direction:'top',offset:[0,-10]});
    g.addTo(map);markers.push(g);
    if(places.length){
      const b=L.latLngBounds([[35.1784,137.0585],[places[0].lat,places[0].lng]]);map.fitBounds(b,{padding:[40,40]});
    }else map.setView([35.1784,137.0585],11);
    // still add nagoya places below
  }

  // 필터 적용된 장소만 지도에 표시
  const isGroupFilter=filt.startsWith('🍣')||filt.startsWith('🍜')||filt.startsWith('🍢')||filt.startsWith('🥩')||filt.startsWith('🍺')||filt.startsWith('☕')||filt.startsWith('🛍')||filt.startsWith('📸');
  const fp=filt==='all'?places:isGroupFilter?places.filter(p=>catToGroup(p.cat)===filt):places.filter(p=>p.area===filt);
  const group=[];
  fp.forEach(p=>{
    const v=visited[p.name];
    const m=L.circleMarker([p.lat,p.lng],{radius:7,fillColor:v?'#ccc':cc(p.cat),color:'#fff',weight:2,fillOpacity:v?.4:.9}).bindPopup(`<div style="font-family:Inter,sans-serif"><strong>${p.name}</strong><br><small style="color:#666">${p.area} · ${p.cat||''}</small>${p.note?'<br><small style="color:#ff385c">'+p.note+'</small>':''}<br><a href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" style="color:#228be6;font-size:12px">Google Maps에서 보기 &#8599;</a></div>`).bindTooltip(p.name,{direction:'top',offset:[0,-6]});
    m.addTo(map);markers.push(m);group.push([p.lat,p.lng]);
  });

  if(group.length>1){map.fitBounds(group,{padding:[40,40]})}
  else if(group.length===1){map.setView(group[0],15)}
  else{map.setView([a.lat,a.lng],14)}
}

function fly(lat,lng,n){
  // 모바일이면 지도로 스크롤
  if(window.innerWidth<=768){
    document.getElementById('mapWrap').scrollIntoView({behavior:'smooth'});
  }
  setTimeout(()=>{
    map.invalidateSize();
    map.setView([lat,lng],17);
    const name=decodeURIComponent(n);
    markers.forEach(m=>{if(m.getPopup&&m.getPopup()?.getContent()?.includes(name))m.openPopup()});
  },300);
}

// Init
map=L.map('map',{zoomControl:true}).setView([34.665,135.505],14);
L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=ko',{attribution:'&copy; Google Maps',maxZoom:20}).addTo(map);

document.getElementById('pc').textContent=allPlaces().length+' Places';
renderTabs();
render();
</script>
</body>
</html>
